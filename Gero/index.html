<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gero - Sewa Perlengkapan Outdoor Terpercaya</title>
    <link  rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- NAVBART START -->
    <section id="navbar">
        <div id="nav_container">
            <div id="nav_logo">
                <img alt="logo gero" src="assets/gero_logo.svg">
            </div>
            <div id="nav_menu">
                <ul>
                    <li>Beranda</li>
                    <li>Riwayat</li>
                    <li>Keranjang</li>
                </ul>
            </div>
        </div>
    </section>
    <!-- NAVBAR END -->

    <!-- HERO SECTION START -->
    <section id="hero">
        <div id="cont_hero">
            <div id="text_hero">
                <p>Sewa Perlengkapan Outdoor Tanpa Ribet dan Terpercaya</p>
                <p>Dari sepatu hiking hingga tenda camping.</p>
            </div>
        </div>
    </section>
    <!-- HERO SECTION END -->

    <!-- CATEGORY START -->
    <section id="category">
        <div id="cont_ctgr">
            <ul>
                <li>Hiking</li>
                <li>Camping</li>
                <li>Running</li>
            </ul>
        </div>
    </section>
    <!-- CATEGORY END -->

    <!-- PRODUCT START -->
    <section id="products">
        <div id="cont_prod">
            <div class="card_prod">
                <img alt="Eiger Piranha 2">
                <p>Eiger Piranha 2</p>
            </div>
            <div class="card_prod">
                <img alt="Consina Carrier 60L">
                <p>Consina Carrier 60L</p>
            </div>
            <div class="card_prod">
                <img alt="Sleeping Bag Naturehike">
                <p>Sleeping Bag Naturehike</p>
            </div>
            <div class="card_prod">
                <img alt="Kompor Portable">
                <p>Kompor Portable</p>
            </div>
        </div>
    </section>
    <!-- PRODUCT END -->
    
</body>
</html>
