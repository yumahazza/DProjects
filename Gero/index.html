<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gero - Sewa Perlengkapan Outdoor Terpercaya</title>
    <link  rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- NAVBART START -->
    <section id="navbar">
        <div id="nav_cont">
            <div id="nav_logo">
                <img alt="logo gero" src="assets/gero_logo.svg">
            </div>
            <div id="nav_menu">
                <ul>
                    <li>Beranda</li>
                    <li>Riwayat</li>
                    <li>Keranjang</li>
                </ul>
            </div>
        </div>
    </section>
    <!-- NAVBAR END -->

    <!-- HERO SECTION START -->
    <section id="hero">
        <div id="cont_hero">
            <div id="text_hero">
                <p>Sewa Perlengkapan Outdoor Tanpa Ribet dan Terpercaya</p>
                <p>Dari sepatu hiking hingga tenda camping.</p>
            </div>
        </div>
    </section>
    <!-- HERO SECTION END -->

    <!-- CATEGORY START -->
    <section id="category">
        <div id="cont_ctgr">
            <div id="head_ctgr">
                <p>Category</p>
            </div>
            <div id="li_ctgr">
                <button>Running</button>
                <button>Camping</button>
                <button>Hiking</button>
            </div>
        </div>
    </section>
    <!-- CATEGORY END -->

    <!-- PRODUCT START -->
    <section id="products">
        <div id="cont_prod">
            <div id="head_prod">
                <p>Our Products</p>
            </div>
            <div id="cont_card">
                <div class="card_prod">
                    <img alt="Eiger Piranha 2" src="assets/eigerpiranha2.png">
                    <p>Eiger Piranha 2</p>
                </div>
                <div class="card_prod">
                    <img alt="Consina Carrier 60L" src="assets/consinacarrier60L.jpg">
                    <p>Consina Carrier 60L</p>
                </div>
                <div class="card_prod">
                    <img alt="Sleeping Bag Naturehike" src="assets/sleepingbag.png">
                    <p>Sleeping Bag Naturehike</p>
                </div>
                <div class="card_prod">
                    <img alt="Kompor Portable" src="assets/komporportabel.jpg">
                    <p>Kompor Portable</p>
                </div>
            </div>
        </div>
    </section>
    <!-- PRODUCT END -->
    
</body>
</html>
